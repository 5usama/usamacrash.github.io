<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe Required - Usama's Bots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #03050b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .subscribe-box {
            max-width: 500px;
            width: 100%;
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            border: 2px solid rgba(255, 0, 0, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .lock-icon {
            font-size: 70px;
            margin-bottom: 20px;
        }
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 15px;
        }
        .sub-text {
            color: #ff4444;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        p {
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .youtube-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .youtube-btn:hover {
            transform: scale(1.02);
            background: #cc0000;
        }
        .verify-btn {
            background: #00aaff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .verify-btn:hover {
            transform: scale(1.02);
            background: #0088cc;
        }
        .warning {
            margin-top: 20px;
            font-size: 12px;
            color: #ffaa66;
        }
        .error-msg {
            color: #ff6666;
            margin-top: 10px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="subscribe-box">
        <div class="lock-icon">🔒</div>
        <h1>⚠️ Subscription Required</h1>
        <div class="sub-text">📺 Must Subscribe to YouTube Channel</div>
        <p>To access Usama's Bot Panel & Community Dashboard,<br>please subscribe to our YouTube channel first.</p>
        <button class="youtube-btn" id="subscribeBtn">▶ SUBSCRIBE NOW</button>
        <button class="verify-btn" id="verifyBtn">✓ I HAVE SUBSCRIBED</button>
        <div class="warning">⚠️ After subscribing, click the button above to continue</div>
        <div class="error-msg" id="errorMsg">❌ Please subscribe to the channel first!</div>
    </div>

    <script>
        const YT_URL = "https://youtube.com/@botswithusama?sub_confirmation=1";
        
        document.getElementById('subscribeBtn').onclick = () => {
            window.open(YT_URL, '_blank');
        };
        
        document.getElementById('verifyBtn').onclick = async () => {
            // Generate a random token
            const token = Math.random().toString(36).substring(2) + Date.now();
            const visitTime = new Date().toISOString();
            
            // Store in sessionStorage (clears when browser closes)
            sessionStorage.setItem('usama_temp_token', token);
            sessionStorage.setItem('usama_visit_time', visitTime);
            
            // Also store with timestamp in localStorage but with expiry
            const subscriptionData = {
                verified: true,
                token: token,
                timestamp: Date.now(),
                expires: Date.now() + (7 * 24 * 60 * 60 * 1000) // 7 days expiry
            };
            localStorage.setItem('usama_verified_data', JSON.stringify(subscriptionData));
            
            // Redirect to dashboard
            window.location.href = 'index.html';
        };
        
        // Check if already verified but not expired
        const savedData = localStorage.getItem('usama_verified_data');
        if (savedData) {
            try {
                const data = JSON.parse(savedData);
                if (data.verified && data.expires > Date.now()) {
                    window.location.href = 'index.html';
                } else if (data.expires <= Date.now()) {
                    localStorage.removeItem('usama_verified_data');
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
