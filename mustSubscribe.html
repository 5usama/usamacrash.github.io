<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe Required - Usama's Bots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #03050b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .subscribe-box {
            max-width: 500px;
            width: 100%;
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            border: 2px solid rgba(255, 0, 0, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .lock-icon {
            font-size: 70px;
            margin-bottom: 20px;
        }
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 15px;
        }
        .sub-text {
            color: #ff4444;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        p {
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .youtube-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .youtube-btn:hover {
            transform: scale(1.02);
            background: #cc0000;
        }
        .verify-btn {
            background: #00aaff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.2s;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .verify-btn.show {
            opacity: 1;
            visibility: visible;
        }
        .verify-btn:hover {
            transform: scale(1.02);
            background: #0088cc;
        }
        .timer-text {
            margin-top: 20px;
            font-size: 14px;
            color: #ffaa66;
            font-weight: bold;
        }
        .warning {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="subscribe-box">
        <div class="lock-icon">🔒</div>
        <h1>⚠️ Subscription Required</h1>
        <div class="sub-text">📺 Must Subscribe to YouTube Channel</div>
        <p>To access Usama's Bot Panel & Community Dashboard,<br>please subscribe to our YouTube channel first.</p>
        
        <button class="youtube-btn" id="subscribeBtn">▶ SUBSCRIBE NOW</button>
        <button class="verify-btn" id="verifyBtn">✓ I HAVE SUBSCRIBED</button>
        
        <div class="timer-text" id="timerText">⏳ Please wait 10 seconds...</div>
        <div class="warning">⚠️ Subscribe to the channel first, then click "I HAVE SUBSCRIBED"</div>
    </div>

    <script>
        const YT_URL = "https://youtube.com/@botswithusama?sub_confirmation=1";
        let timer = 10;
        let timerInterval;
        
        document.getElementById('subscribeBtn').onclick = () => {
            window.open(YT_URL, '_blank');
        };
        
        // Hide verify button initially
        const verifyBtn = document.getElementById('verifyBtn');
        const timerText = document.getElementById('timerText');
        
        // Start countdown
        timerInterval = setInterval(() => {
            timer--;
            
            if (timer <= 0) {
                // Show verify button after 10 seconds
                clearInterval(timerInterval);
                verifyBtn.classList.add('show');
                timerText.innerHTML = '✅ You can now click "I HAVE SUBSCRIBED"';
                timerText.style.color = '#66ff66';
            } else {
                timerText.innerHTML = `⏳ Please wait ${timer} seconds before verifying...`;
            }
        }, 1000);
        
        document.getElementById('verifyBtn').onclick = () => {
            // Check if button is visible (10 seconds passed)
            if (verifyBtn.classList.contains('show')) {
                // Store verification with expiry (7 days)
                const subscriptionData = {
                    verified: true,
                    timestamp: Date.now(),
                    expires: Date.now() + (7 * 24 * 60 * 60 * 1000)
                };
                localStorage.setItem('usama_verified_data', JSON.stringify(subscriptionData));
                window.location.href = 'index.html';
            }
        };
        
        // Check if already verified
        const savedData = localStorage.getItem('usama_verified_data');
        if (savedData) {
            try {
                const data = JSON.parse(savedData);
                if (data.verified && data.expires > Date.now()) {
                    window.location.href = 'index.html';
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
