<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe - Usama's Bots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03050b);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(12, 18, 34, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            border: 1px solid rgba(255, 0, 0, 0.4);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }
        .lock {
            font-size: 70px;
            margin-bottom: 20px;
        }
        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 15px;
        }
        .required {
            color: #ff4444;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .info {
            color: #aaa;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .subscribe-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .subscribe-btn:hover {
            background: #cc0000;
            transform: scale(1.02);
        }
        .verify-btn {
            background: #00aaff;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.2s;
            display: none;
        }
        .verify-btn.show {
            display: block;
        }
        .verify-btn:hover {
            background: #0088cc;
            transform: scale(1.02);
        }
        .timer {
            margin-top: 25px;
            font-size: 16px;
            color: #ffaa66;
            font-weight: bold;
        }
        .note {
            margin-top: 15px;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lock">🔒</div>
        <h1>Subscription Required!</h1>
        <div class="required">📺 Must Subscribe to YouTube</div>
        <div class="info">
            To access Usama's Bot Panel and Community Dashboard,<br>
            please subscribe to our YouTube channel first.
        </div>
        
        <button class="subscribe-btn" id="subscribeBtn">
            ▶ SUBSCRIBE NOW
        </button>
        
        <button class="verify-btn" id="verifyBtn">
            ✓ I HAVE SUBSCRIBED
        </button>
        
        <div class="timer" id="timerDisplay">
            ⏳ Please wait 10 seconds...
        </div>
        <div class="note">
            After subscribing, wait 10 seconds then click verify
        </div>
    </div>

    <script>
        // YouTube Channel URL
        const YOUTUBE_URL = "https://youtube.com/@botswithusama?sub_confirmation=1";
        
        // Get elements
        const subscribeBtn = document.getElementById('subscribeBtn');
        const verifyBtn = document.getElementById('verifyBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        
        let countdown = 10;
        let timerInterval = null;
        
        // Subscribe button click - opens YouTube
        subscribeBtn.onclick = function() {
            window.open(YOUTUBE_URL, '_blank');
        };
        
        // Start countdown immediately when page loads
        function startCountdown() {
            timerInterval = setInterval(function() {
                countdown--;
                
                if (countdown <= 0) {
                    // Stop timer
                    clearInterval(timerInterval);
                    
                    // Show verify button
                    verifyBtn.classList.add('show');
                    
                    // Update timer text
                    timerDisplay.innerHTML = '✅ You can now click "I HAVE SUBSCRIBED"';
                    timerDisplay.style.color = '#66ff66';
                } else {
                    timerDisplay.innerHTML = '⏳ Please wait ' + countdown + ' seconds...';
                }
            }, 1000);
        }
        
        // Start countdown
        startCountdown();
        
        // Verify button click - saves to localStorage and redirects
        verifyBtn.onclick = function() {
            // Check if button is visible (countdown finished)
            if (verifyBtn.classList.contains('show')) {
                // Save verification data with 7 days expiry
                const data = {
                    verified: true,
                    date: Date.now(),
                    expires: Date.now() + (7 * 24 * 60 * 60 * 1000)
                };
                localStorage.setItem('usama_verified', JSON.stringify(data));
                
                // Redirect to dashboard
                window.location.href = 'index.html';
            }
        };
        
        // Check if already verified (on page load)
        const saved = localStorage.getItem('usama_verified');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.verified && parsed.expires > Date.now()) {
                    // Already verified, go to dashboard
                    window.location.href = 'index.html';
                } else if (parsed.expires <= Date.now()) {
                    // Expired, remove from storage
                    localStorage.removeItem('usama_verified');
                }
            } catch(e) {
                console.log('Error parsing saved data');
            }
        }
    </script>
</body>
</html>
