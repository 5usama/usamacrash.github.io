<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Subscribe Required | Usama's Bots</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #02040c);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 70% 20%, rgba(0, 180, 255, 0.08), transparent 60%),
                  radial-gradient(circle at 30% 85%, rgba(200, 100, 255, 0.1), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .subscribe-card {
      position: relative;
      z-index: 10;
      max-width: 560px;
      width: 100%;
      background: rgba(10, 18, 32, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      border: 1px solid rgba(90, 160, 255, 0.4);
      box-shadow: 0 35px 60px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(70, 150, 255, 0.3) inset;
      padding: 2.5rem 2rem 2.8rem;
      text-align: center;
      transition: transform 0.25s ease;
      animation: floatGlow 3s infinite alternate;
    }

    @keyframes floatGlow {
      0% { box-shadow: 0 35px 60px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(70, 150, 255, 0.3) inset; transform: translateY(0px);}
      100% { box-shadow: 0 45px 70px rgba(0, 0, 0, 0.7), 0 0 0 1.5px rgba(100, 180, 255, 0.5) inset; transform: translateY(-6px);}
    }

    .lock-icon {
      font-size: 4rem;
      color: #ffc107;
      background: rgba(255, 193, 7, 0.12);
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 200, 80, 0.5);
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFFFF, #FFE6B0, #FFB347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.75rem;
    }

    .sub-message {
      font-size: 1rem;
      font-weight: 500;
      color: #cddcff;
      background: rgba(255,255,245,0.05);
      display: inline-block;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      margin-bottom: 1.6rem;
    }

    .description {
      font-size: 0.98rem;
      line-height: 1.55;
      color: #b9ceff;
      margin-bottom: 2rem;
    }

    .youtube-preview {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 2rem;
      padding: 0.8rem 1rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      border: 1px solid rgba(255, 80, 80, 0.3);
    }

    .channel-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .channel-info i {
      font-size: 2.5rem;
      color: #FF0000;
    }

    .channel-text {
      text-align: left;
    }

    .channel-text h4 {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      color: #fff;
      font-size: 1rem;
    }

    .channel-text p {
      font-size: 0.7rem;
      color: #afc2f0;
    }

    .sub-button {
      background: linear-gradient(95deg, #FF0000, #cc0000);
      border: none;
      padding: 0.7rem 1.6rem;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .sub-button:hover {
      background: linear-gradient(95deg, #e60000, #aa0000);
      transform: scale(1.02);
    }

    .verify-section {
      margin-top: 1.8rem;
      background: rgba(255,255,240,0.05);
      padding: 1rem 0.8rem;
      border-radius: 2rem;
    }

    .verify-btn {
      background: rgba(59, 130, 246, 0.85);
      border: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      padding: 0.85rem 1.6rem;
      border-radius: 60px;
      font-size: 1rem;
      color: white;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .verify-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    .warning-text {
      font-size: 0.7rem;
      color: #ffb870;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
  </style>
</head>
<body>

<div class="subscribe-card">
  <div class="lock-icon">
    <i class="fas fa-lock"></i>
  </div>
  <h1>Subscription Required</h1>
  <div class="sub-message">
    <i class="fab fa-youtube"></i> Must Subscribe to Access
  </div>
  <div class="description">
    To unlock the full bot panel & community dashboard, you need to subscribe to <strong>Usama's YouTube channel</strong>.
  </div>

  <div class="youtube-preview">
    <div class="channel-info">
      <i class="fab fa-youtube"></i>
      <div class="channel-text">
        <h4>Usama's Bots Hub</h4>
        <p>@botswithusama</p>
      </div>
    </div>
    <button class="sub-button" id="youtubeSubscribeBtn">
      <i class="fab fa-youtube"></i> Subscribe
      <i class="fas fa-bell"></i>
    </button>
  </div>

  <div class="verify-section">
    <button class="verify-btn" id="verifySubscriptionBtn">
      <i class="fas fa-check-circle"></i> I've Subscribed — Unlock Dashboard
    </button>
    <div class="warning-text">
      <i class="fas fa-info-circle"></i> After subscribing, click the button above to verify.
    </div>
  </div>
</div>

<script>
  const YOUTUBE_URL = "https://youtube.com/@botswithusama?sub_confirmation=1";
  
  document.getElementById('youtubeSubscribeBtn').addEventListener('click', () => {
    window.open(YOUTUBE_URL, '_blank');
  });
  
  document.getElementById('verifySubscriptionBtn').addEventListener('click', () => {
    localStorage.setItem('usama_bots_subscribed', 'true');
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
