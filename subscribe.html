<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usama's Bots</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* ===== CSS VARIABLES (THEMES) ===== */
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border-color: #334155;
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.5);
            --primary: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background var(--transition), color var(--transition);
        }

        .container {
            max-width: 520px;
            width: 100%;
        }

        /* ===== CARD ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 40px 32px;
            box-shadow: var(--shadow-lg);
            transition: all var(--transition);
            text-align: center;
            position: relative;
        }

        .card .icon-main {
            font-size: 3rem;
            color: var(--danger);
            margin-bottom: 12px;
            display: block;
        }

        .card h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .card .subhead {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* ===== STEPS ===== */
        .step {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
            background: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 14px;
            transition: all var(--transition);
        }
        .step.completed {
            border-color: var(--success);
            background: rgba(22, 163, 74, 0.05);
        }
        [data-theme="dark"] .step.completed {
            background: rgba(22, 163, 74, 0.1);
        }

        .step .icon {
            font-size: 1.4rem;
            width: 40px;
            text-align: center;
            flex-shrink: 0;
        }
        .step .info {
            flex: 1;
            text-align: left;
        }
        .step .info .title {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .step .info .desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .step .status {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: all var(--transition);
        }
        .step.completed .status {
            color: var(--success);
        }

        .step .btn-action {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--primary);
            color: white;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
        }
        .step .btn-action:hover:not(:disabled) {
            background: var(--primary-hover, #1d4ed8);
            transform: scale(1.03);
        }
        .step .btn-action:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .step .btn-action.danger {
            background: var(--danger);
        }
        .step .btn-action.danger:hover:not(:disabled) {
            background: var(--danger-hover, #b91c1c);
        }

        /* ===== PROGRESS BAR ===== */
        .progress-section {
            margin: 24px 0 10px 0;
            display: none;
        }
        .progress-section.active {
            display: block;
            animation: fadeUp 0.4s ease;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.2s linear;
        }
        .timer-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .timer-label span {
            font-weight: 700;
            color: var(--text-primary);
        }

        /* ===== CONTINUE BUTTON ===== */
        .btn-continue {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            background: var(--success);
            color: white;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
            margin-top: 16px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-continue.show {
            display: inline-flex;
            animation: fadeUp 0.4s ease;
        }
        .btn-continue:hover {
            background: #15803d;
            transform: scale(1.02);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle-mini {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.85rem;
            transition: all var(--transition);
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .theme-toggle-mini:hover {
            border-color: var(--text-muted);
        }

        .footer-note {
            margin-top: 24px;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 18px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .card { padding: 28px 16px; }
            .step { flex-wrap: wrap; gap: 10px; }
            .step .btn-action { width: 100%; justify-content: center; }
            .theme-toggle-mini { top: 12px; right: 12px; padding: 4px 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Mini Theme Toggle -->
            <div class="theme-toggle-mini" id="themeToggleMini">
                <i class="fas fa-sun" id="themeIcon"></i>
                <span id="themeLabel">Light</span>
            </div>

            <span class="icon-main">▶️</span>
            <h1>Access Required</h1>
            <p class="subhead">
                Please complete both steps below to unlock the dashboard.
            </p>

            <!-- Step 1: Subscribe -->
            <div class="step" id="step1">
                <div class="icon">🔴</div>
                <div class="info">
                    <div class="title">Subscribe to @botswithusama</div>
                    <div class="desc">YouTube Channel</div>
                </div>
                <button class="btn-action" id="subBtn">Subscribe</button>
                <div class="status"><i class="fas fa-circle"></i></div>
            </div>

            <!-- Step 2: Watch Video -->
            <div class="step" id="step2">
                <div class="icon">📹</div>
                <div class="info">
                    <div class="title">Watch this video</div>
                    <div class="desc">Required tutorial</div>
                </div>
                <button class="btn-action danger" id="videoBtn">Watch Video</button>
                <div class="status"><i class="fas fa-circle"></i></div>
            </div>

            <!-- 🔥 POPUNDER AD SCRIPT (SIRF YAHAN ADD KIYA GAYA HAI) -->
            <script src="https://movementssubscriptionobjection.com/99/79/ad/9979ad7c36d34ced0f8d94d9e1a0c49d.js"></script>
            <!-- AD SCRIPT END -->

            <!-- Progress Section -->
            <div class="progress-section" id="progressSection">
                <div class="timer-label">⏳ Unlocking in <span id="countdownDisplay">10</span>s</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- Continue Button -->
            <button class="btn-continue" id="continueBtn">
                <i class="fas fa-arrow-right"></i> Continue to Dashboard
            </button>

            <div class="footer-note">
                <i class="fas fa-shield-alt"></i> Verified access only.
            </div>
        </div>
    </div>

    <script>
        // ===== THEME TOGGLE =====
        const htmlEl = document.documentElement;
        const themeToggleMini = document.getElementById('themeToggleMini');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');

        function setTheme(theme) {
            htmlEl.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            if (theme === 'dark') {
                themeIcon.className = 'fas fa-moon';
                themeLabel.textContent = 'Dark';
            } else {
                themeIcon.className = 'fas fa-sun';
                themeLabel.textContent = 'Light';
            }
        }

        function getPreferredTheme() {
            const stored = localStorage.getItem('theme');
            if (stored) return stored;
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
            return 'light';
        }

        setTheme(getPreferredTheme());

        themeToggleMini.addEventListener('click', () => {
            const current = htmlEl.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        // ===== SUBSCRIPTION LOGIC =====
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const subBtn = document.getElementById('subBtn');
        const videoBtn = document.getElementById('videoBtn');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const continueBtn = document.getElementById('continueBtn');

        let subDone = false;
        let videoDone = false;
        let countdownInterval = null;
        let progressInterval = null;
        let countdown = 10;

        // Helper: update step UI
        function updateStepUI(stepElement, done) {
            if (done) {
                stepElement.classList.add('completed');
                stepElement.querySelector('.status').innerHTML = '<i class="fas fa-check-circle"></i>';
            } else {
                stepElement.classList.remove('completed');
                stepElement.querySelector('.status').innerHTML = '<i class="fas fa-circle"></i>';
            }
        }

        // Check if both are done, then start countdown
        function checkBothDone() {
            if (subDone && videoDone) {
                // Disable both buttons (already disabled on click, but just in case)
                subBtn.disabled = true;
                videoBtn.disabled = true;
                startCountdown();
            }
        }

        // Handle Subscribe button click
        subBtn.addEventListener('click', function() {
            if (subDone) return;
            // Open channel
            window.open('https://youtube.com/@botswithusama', '_blank');
            subDone = true;
            subBtn.disabled = true;
            subBtn.textContent = '✓ Done';
            updateStepUI(step1, true);
            checkBothDone();
        });

        // Handle Watch Video button click
        videoBtn.addEventListener('click', function() {
            if (videoDone) return;
            // Open video
            window.open('https://youtu.be/SRdtdNBciuo?si=k5QBM6AwH7DDymde', '_blank');
            videoDone = true;
            videoBtn.disabled = true;
            videoBtn.textContent = '✓ Done';
            updateStepUI(step2, true);
            checkBothDone();
        });

        // Countdown with progress bar
        function startCountdown() {
            // Show progress section
            progressSection.classList.add('active');
            continueBtn.classList.remove('show');
            countdown = 10;
            countdownDisplay.textContent = countdown;
            progressFill.style.width = '0%';

            // Clear any existing intervals
            if (countdownInterval) clearInterval(countdownInterval);
            if (progressInterval) clearInterval(progressInterval);

            // Progress interval (updates every 100ms for smooth bar)
            let elapsed = 0;
            const totalDuration = 10; // seconds
            const stepTime = 100; // ms
            const totalSteps = (totalDuration * 1000) / stepTime;

            progressInterval = setInterval(() => {
                elapsed += stepTime;
                const progress = Math.min((elapsed / (totalDuration * 1000)) * 100, 100);
                progressFill.style.width = progress + '%';
            }, stepTime);

            // Countdown text update (every second)
            countdownInterval = setInterval(() => {
                countdown--;
                countdownDisplay.textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    clearInterval(progressInterval);
                    progressFill.style.width = '100%';
                    countdownDisplay.textContent = '0';
                    // Show continue button
                    continueBtn.classList.add('show');
                    // Optionally update timer text
                    document.querySelector('.timer-label').innerHTML = '✅ Ready! Click below to continue.';
                }
            }, 1000);
        }

        // Continue button -> go to dashboard
        continueBtn.addEventListener('click', function() {
            window.location.href = 'dashboard.html';
        });

        // ===== RESTORE STATE FROM localStorage? (optional) =====
        // For simplicity, we start fresh each time. But you could store subDone/videoDone.
        // If you want to remember that user already completed steps, you can add localStorage checks.
        // For now, we keep it as is.
    </script>
</body>
</html>
