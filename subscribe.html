<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usama's Bots</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* ===== CSS VARIABLES (THEMES) ===== */
        :root {
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border-color: #334155;
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.5);
            --primary: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background var(--transition), color var(--transition);
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        /* ===== CARD ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 40px 32px;
            box-shadow: var(--shadow-lg);
            transition: all var(--transition);
            text-align: center;
        }

        .card .icon-main {
            font-size: 3.5rem;
            color: var(--danger);
            margin-bottom: 12px;
            display: block;
        }

        .card h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .card .subhead {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* ===== STEPS ===== */
        .steps {
            text-align: left;
            margin: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            background: var(--bg-primary);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            transition: all var(--transition);
        }
        .step-item.completed {
            border-color: var(--success);
            background: rgba(22, 163, 74, 0.05);
        }
        [data-theme="dark"] .step-item.completed {
            background: rgba(22, 163, 74, 0.1);
        }

        .step-item .num {
            width: 32px;
            height: 32px;
            background: var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .step-item.completed .num {
            background: var(--success);
            color: white;
        }

        .step-item .content {
            flex: 1;
        }
        .step-item .content .title {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .step-item .content .desc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .step-item .status-icon {
            font-size: 1.2rem;
            color: var(--text-muted);
            transition: all var(--transition);
        }
        .step-item.completed .status-icon {
            color: var(--success);
        }

        /* ===== BUTTONS ===== */
        .btn-block {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            margin-top: 8px;
        }
        .btn-primary:hover:not(:disabled) {
            background: #1d4ed8;
            transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-success {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
            margin-top: 12px;
            display: none;
        }
        .btn-success.show {
            display: inline-flex;
            animation: fadeUp 0.4s ease;
        }
        .btn-success:hover {
            background: #15803d;
            transform: scale(1.02);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .timer-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 16px;
            min-height: 24px;
            transition: all var(--transition);
        }
        .timer-text.active {
            color: var(--primary);
            font-weight: 600;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        /* Theme Toggle inside card */
        .theme-toggle-mini {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all var(--transition);
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .theme-toggle-mini:hover {
            border-color: var(--text-muted);
        }
        .card { position: relative; }

            .card { padding: 28px 20px; }
            .step-item { padding: 12px 14px; }
