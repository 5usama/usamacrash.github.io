<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe - Usama's Bots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #0a0f1e, #02040c);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .full-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 10%, #0a0f1e, #02040c);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .subscribe-card {
            max-width: 500px;
            width: 90%;
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 60px 40px;
            text-align: center;
            border: 2px solid rgba(255, 0, 0, 0.5);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .youtube-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: bounce 1s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            color: white;
            font-size: 36px;
            margin-bottom: 15px;
        }
        
        .required-text {
            color: #ff4444;
            font-size: 20px;
            margin-bottom: 25px;
            font-weight: bold;
        }
        
        .info-text {
            color: #aaa;
            margin-bottom: 40px;
            line-height: 1.6;
            font-size: 16px;
        }
        
        .main-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-bottom: 30px;
        }
        
        .main-btn:hover {
            background: #cc0000;
            transform: scale(1.02);
        }
        
        .continue-btn {
            background: #00aaff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            display: none;
        }
        
        .continue-btn.show {
            display: block;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .continue-btn:hover {
            background: #0088cc;
            transform: scale(1.02);
        }
        
        .timer-text {
            margin-top: 20px;
            font-size: 16px;
            color: #ffaa66;
            font-weight: bold;
        }
        
        .small-note {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        
        @media (max-width: 550px) {
            .subscribe-card {
                padding: 40px 25px;
            }
            h1 {
                font-size: 28px;
            }
            .main-btn {
                font-size: 18px;
                padding: 14px 30px;
            }
            .youtube-icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="full-page">
        <div class="subscribe-card">
            <div class="youtube-icon">📺</div>
            <h1>Subscribe Required!</h1>
            <div class="required-text">⚠️ Must Subscribe to YouTube</div>
            <div class="info-text">
                To access Usama's Bot Panel and Community Dashboard<br>
                Please subscribe to our YouTube channel first
            </div>
            
            <button class="main-btn" id="subscribeBtn">
                ▶ SUBSCRIBE NOW
            </button>
            
            <button class="continue-btn" id="continueBtn">
                ✓ CONTINUE TO DASHBOARD →
            </button>
            
            <div class="timer-text" id="timerText">
                ⏳ Subscribe then wait 5 seconds...
            </div>
            <div class="small-note">
                After subscribing, wait 5 seconds then click continue
            </div>
        </div>
    </div>

    <script>
        const YOUTUBE_URL = "https://youtube.com/@botswithusama?sub_confirmation=1";
        
        const subscribeBtn = document.getElementById('subscribeBtn');
        const continueBtn = document.getElementById('continueBtn');
        const timerText = document.getElementById('timerText');
        
        let countdown = 5;
        let timerInterval = null;
        let isSubscribedClicked = false;
        
        // Subscribe button click
        subscribeBtn.onclick = function() {
            window.open(YOUTUBE_URL, '_blank');
            isSubscribedClicked = true;
            
            // Start countdown
            if (timerInterval) clearInterval(timerInterval);
            countdown = 5;
            
            timerInterval = setInterval(function() {
                countdown--;
                
                if (countdown <= 0) {
                    clearInterval(timerInterval);
                    continueBtn.classList.add('show');
                    timerText.innerHTML = '✅ You can now click CONTINUE';
                    timerText.style.color = '#66ff66';
                } else {
                    timerText.innerHTML = '⏳ Please wait ' + countdown + ' seconds before continuing...';
                }
            }, 1000);
        };
        
        // Continue button click
        continueBtn.onclick = function() {
            if (continueBtn.classList.contains('show')) {
                // Save subscription data (7 days expiry)
                const data = {
                    verified: true,
                    timestamp: Date.now(),
                    expires: Date.now() + (7 * 24 * 60 * 60 * 1000)
                };
                localStorage.setItem('usama_subscribed', JSON.stringify(data));
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        };
        
        // Check if already subscribed
        const saved = localStorage.getItem('usama_subscribed');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.verified && parsed.expires > Date.now()) {
                    window.location.href = 'dashboard.html';
                } else if (parsed.expires <= Date.now()) {
                    localStorage.removeItem('usama_subscribed');
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
